name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Index
        run: |
          cd indexer
          npm install
          node build-index.mjs
          cd ..

      - name: Build Angular App
        run: npx ng build --base-href /zero-rag/

      - name: Find Build Output
        run: find dist/SLM/browser -maxdepth 3

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/SLM/browser
          branch: gh-pages
