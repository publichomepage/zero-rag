name: Build Search Index

permissions:
  contents: write

on:
  push:
    paths:
      - 'docs/**'
    branches: [main]
  workflow_dispatch:

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd indexer && npm install

      - name: Build search index
        run: cd indexer && node build-index.mjs

      - name: Verify generated files
        run: |
          if [ -d "public/index" ]; then
            echo "Index files found:"
            ls -R public/index
          else
            echo "Error: public/index directory was not created!"
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/index/
          git diff --staged --quiet || (git commit -m "chore: auto-rebuild search index" && git push)
